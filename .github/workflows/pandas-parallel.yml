name: Pandas Parallel Execution

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_index: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest  

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Run Balanced Pandas Tests
        run: |
          chmod +x run-pandas-tests.sh
          ./run-pandas-tests.sh schedule.json ${{ matrix.node_index }}